name: learnai-server-ci

# Light, sub-second build smoke for the LearnAI fork's server/ tree.
#
# Runs on any change under server/** and verifies:
#   * every server module imports cleanly,
#   * every alembic migration loads + chains correctly,
#   * PostgresHistoryManager still matches mem0's SQLiteManager surface.
#
# Pure-import checks. No Postgres, no LLM, no network. The expensive
# behavioural test is the smoke against the live deployment — see
# scripts/smoke-deploy.sh in oznakash/learnai.

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/learnai-server-ci.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/learnai-server-ci.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install runtime deps + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install pytest

      - name: Run server build tests
        working-directory: server
        run: pytest tests/ -q
